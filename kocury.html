<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktualny miot | Akwamaryn*PL</title>

<style>

/* ===== TWOJE STYLE (BEZ ZMIAN) ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f6efe9;color:#2f2723;overflow-x:hidden;}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit}

/* ===== POPRAWKA KLIKNIĘCIA ===== */
.miot-slide img{
  pointer-events:auto; /* ← KLUCZOWA ZMIANA */
}

/* ===== LIGHTBOX ===== */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:16px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:32px;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- ===== TWOJA STRONA (BEZ ZMIAN UKŁADU) ===== -->

<!-- RODZICE (NAPRAWIONE LINKI) -->
<a href="kotki.html#dalia">Dalia</a>
<a href="kocury.html#posejdon">Posejdon</a>

<!-- GALERIA -->
<div class="miot-slider">

  <div class="miot-slide">
    <img src="images/miot-m/maluch-1.jpg">
  </div>

  <div class="miot-slide">
    <img src="images/miot-m/maluch-2.jpg">
  </div>

  <div class="miot-slide">
    <img src="images/miot-m/maluch-3.jpg">
  </div>

  <div class="miot-slide">
    <img src="images/miot-m/maluch-4.jpg">
  </div>

  <div class="miot-slide">
    <img src="images/miot-m/maluch-5.jpg">
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img">
</div>

<script>

/* ===== LIGHTBOX ===== */
const images = document.querySelectorAll('.miot-slide img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

let currentIndex = 0;

images.forEach((img,index)=>{
  img.addEventListener('click',()=>{
    currentIndex=index;
    showImage();
    lightbox.style.display="flex";
  });
});

function showImage(){
  lightboxImg.src = images[currentIndex].src;
}

function closeLightbox(){
  lightbox.style.display="none";
}

/* ===== SWIPE ===== */
let startX=0;

lightbox.addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

lightbox.addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50){
    currentIndex=(currentIndex+1)%images.length;
    showImage();
  }

  if(endX-startX>50){
    currentIndex=(currentIndex-1+images.length)%images.length;
    showImage();
  }
});

</script>

</body>
</html>
