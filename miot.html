<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktualny miot | Akwamaryn*PL</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Georgia,"Times New Roman",serif;
background:linear-gradient(180deg,#fffafc 0%,#f8eef3 100%);
color:#654f58;
}

/* MENU */

.topbar{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
z-index:5000;
}

.topbar-inner{
max-width:1200px;
margin:auto;
padding:16px 20px;
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
}

.brand{
font-size:26px;
font-weight:600;
color:#7a5665;
}

.nav-links{
display:flex;
flex-wrap:wrap;
gap:14px;
font-weight:600;
color:#7a5665;
}

.nav-links a{
font-size:15px;
text-decoration:none;
color:#7a5665;
}

/* SEKCJA */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.section{
background:white;
border-radius:28px;
padding:40px 24px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.section h1{
text-align:center;
font-size:46px;
color:#7a5665;
margin-bottom:20px;
}

/* KOCIĘTA */

.kitten-list{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:22px;
margin-top:30px;
}

.kitten-item{
background:white;
border-radius:28px;
padding:18px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.kitten-photo{
width:100%;
border-radius:28px;
overflow:hidden;
}

.kitten-photo img{
width:100%;
height:320px;
object-fit:cover;
display:block;
border-radius:28px;
cursor:pointer;
}

.kitten-name{
font-size:22px;
margin-top:14px;
font-weight:600;
color:#7a5665;
}

.kitten-status{
font-size:16px;
margin-top:6px;
line-height:1.6;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:16px;
}

/* RESPONSIVE */

@media(max-width:768px){

.kitten-list{
grid-template-columns:1fr;
}

.kitten-photo img{
height:300px;
}

.nav-links{
justify-content:center;
}

}

</style>
</head>

<body>

<div class="topbar">
<div class="topbar-inner">

<div class="brand">Akwamaryn*PL</div>

<div class="nav-links">
<a href="index.html">Strona główna</a>
<a href="kotki.html">Moje kotki</a>
<a href="kocury.html">Kocury hodowlane</a>
<a href="kocieta.html">Moje kocięta</a>

<a href="galeria.html">Galeria</a>
<a href="rezerwacja.html">Rezerwacja</a>
<a href="kontakt.html">Kontakt</a>
</div>

</div>
</div>

<div class="container">

<section class="section">

<h1>Aktualny miot</h1>

<div class="kitten-list">

<div class="kitten-item">
<div class="kitten-photo">
<img src="file_000000003488720ab10a35d2c061f697.jpg" onclick="openSlider(0)">
</div>
<div class="kitten-name">Isabella</div>
<div class="kitten-status">Kotka<br>Zarezerwowana</div>
</div>

<div class="kitten-item">
<div class="kitten-photo">
<img src="7609D8BB-1057-42E2-8D4C-BC680CF0DF02.PNG" onclick="openSlider(1)">
</div>
<div class="kitten-name">Inka</div>
<div class="kitten-status">Kotka<br>Zarezerwowana</div>
</div>

<div class="kitten-item">
<div class="kitten-photo">
<img src="16C1FA6C-F8DB-4B6F-9B1F-288C29FB4E21.PNG" onclick="openSlider(2)">
</div>
<div class="kitten-name">I'Henio</div>
<div class="kitten-status">Kocurek<br>Zarezerwowany</div>
</div>

<div class="kitten-item">
<div class="kitten-photo">
<img src="CC9CBEB4-B120-493A-995C-D30737BC4C55.PNG" onclick="openSlider(3)">
</div>
<div class="kitten-name">I'Henryk</div>
<div class="kitten-status">Kocurek<br>Zarezerwowany</div>
</div>

</div>

</section>

</div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

let images=[
"file_000000003488720ab10a35d2c061f697.jpg",
"7609D8BB-1057-42E2-8D4C-BC680CF0DF02.PNG",
"16C1FA6C-F8DB-4B6F-9B1F-288C29FB4E21.PNG",
"CC9CBEB4-B120-493A-995C-D30737BC4C55.PNG"
];

let current=0;

function openSlider(i){
current=i;
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=images[current];
}

document.getElementById("lightbox").addEventListener("click",()=>{
document.getElementById("lightbox").style.display="none";
});

let startX=0;

document.getElementById("lightbox").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("lightbox").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
current=(current+1)%images.length;
}

if(endX-startX>50){
current=(current-1+images.length)%images.length;
}

document.getElementById("lightbox-img").src=images[current];
});

</script>

</body>
</html>
