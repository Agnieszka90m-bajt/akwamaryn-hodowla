<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#fffafc,#f8eef3);
  color:#5a4a52;
}

header{
  padding:30px;
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:34px;
  font-weight:700;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
}

nav a{
  text-decoration:none;
  color:#7a5c66;
  font-weight:600;
}

nav a:hover{
  color:#000;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card h3{
  padding:15px;
  margin:0;
  font-size:18px;
}

footer{
  text-align:center;
  padding:30px;
  margin-top:40px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

  <div class="grid">

    <div class="card">
      <img src="images/kot1.jpg">
      <h3>Kocię 1</h3>
    </div>

    <div class="card">
      <img src="images/kot2.jpg">
      <h3>Kocię 2</h3>
    </div>

    <div class="card">
      <img src="images/kot3.jpg">
