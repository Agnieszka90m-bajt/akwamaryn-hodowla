<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akwamaryn*PL</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Georgia,serif;
background:#fff;
color:#5f4a53;
}

/* MENU */

.menu{
position:absolute;
top:20px;
right:30px;
z-index:10;
}

.menu button{
background:#f3dfe6;
border:none;
padding:12px 20px;
border-radius:15px;
font-size:16px;
cursor:pointer;
}

/* FACEBOOK */

.facebook{
position:fixed;
top:50%;
right:-95px;
transform:translateY(-50%);
background:#3b5998;
color:white;
padding:16px;
border-radius:12px 0 0 12px;
font-weight:600;
transition:0.3s;
writing-mode:vertical-rl;
text-orientation:mixed;
letter-spacing:1px;
}

.facebook:hover{
right:0;
}

/* HERO */

.hero{
height:90vh;
background:url("hero-kotek.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* SZKLANA CHMURA */

.hero-box{

background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-radius:35px;

padding:50px 60px;

max-width:700px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

}

/* TEKST */

.badge{
background:#e8c9d2;
display:inline-block;
padding:10px 20px;
border-radius:20px;
margin-bottom:20px;
font-size:14px;
letter-spacing:2px;
}

h1{
font-size:70px;
color:#7d5968;
margin-bottom:20px;
}

.hero p{
font-size:22px;
line-height:1.7;
margin-bottom:30px;
}

/* PRZYCISKI */

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

.btn{
padding:14px 30px;
border-radius:30px;
border:none;
font-size:16px;
cursor:pointer;
}

.btn-main{
background:linear-gradient(90deg,#eac8d5,#f3e1e7);
}

.btn-outline{
background:white;
border:1px solid #eac8d5;
}

/* RESPONSIVE */

@media(max-width:768px){

.hero-box{
padding:30px;
}

h1{
font-size:45px;
}

.hero p{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="menu">
<button>☰ Menu</button>
</div>

<a class="facebook" href="https://facebook.com" target="_blank">
Facebook
</a>

<section class="hero">

<div class="hero-box">

<div class="badge">
AKWAMARYN*PL
</div>

<h1>Akwamaryn*PL</h1>

<p>
Luksusowa, domowa hodowla kotów rasowych stworzona z pasji do piękna,
klasy, zdrowia i wyjątkowego charakteru.  
Każdy nasz kot jest otoczony troską, miłością i codzienną opieką.
</p>

<div class="buttons">
<button class="btn btn-main">Zobacz kocięta</button>
<button class="btn btn-outline">Kontakt</button>
</div>

</div>

</section>

</body>
</html>
