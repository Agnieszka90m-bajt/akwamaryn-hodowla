<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akwamaryn PL | Hodowla kotów rasowych</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: linear-gradient(180deg, #fffafc 0%, #f8eef3 100%);
      color: #5d4650;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1200;
      background: rgba(255, 248, 251, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(218, 189, 200, 0.45);
      box-shadow: 0 8px 24px rgba(171, 135, 149, 0.10);
    }

    .topbar-inner {
      max-width: 1250px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-size: 24px;
      font-weight: bold;
      color: #7b5564;
      letter-spacing: 0.5px;
    }

    .menu-toggle {
      background: #fff;
      border: 1px solid rgba(208, 176, 188, 0.45);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 18px;
      font-weight: bold;
      color: #7b5564;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(171, 135, 149, 0.10);
      transition: 0.2s ease;
    }

    .menu-toggle:hover {
      background: #fcf3f7;
      transform: translateY(-1px);
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.34);
      opacity: 0;
      visibility: hidden;
      transition: 0.28s ease;
      z-index: 1298;
    }

    .menu-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -330px;
      width: 300px;
      max-width: 85vw;
      height: 100%;
      background: linear-gradient(180deg, #fffefe 0%, #fcf2f6 100%);
      box-shadow: 12px 0 32px rgba(0, 0, 0, 0.14);
      z-index: 1299;
      transition: left 0.28s ease;
      overflow-y: auto;
    }

    .side-menu.open {
      left: 0;
    }

    .side-menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 18px 14px;
      border-bottom: 1px solid #f0e4ea;
      margin-bottom: 8px;
    }

    .side-menu-title {
      font-size: 22px;
      font-weight: bold;
      color: #7b5564;
    }

    .close-btn {
      background: transparent;
      border: 0;
      font-size: 30px;
      line-height: 1;
      color: #7b5564;
      cursor: pointer;
    }
