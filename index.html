<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akwamaryn*PL</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Georgia, "Times New Roman", serif;
      background:linear-gradient(180deg,#fffafc 0%,#f8eef3 100%);
      color:#654f58;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:3000;
      background:rgba(255,248,251,0.68);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(218,189,200,0.20);
      box-shadow:0 8px 24px rgba(171,135,149,0.05);
    }

    .topbar-inner{
      max-width:1280px;
      margin:0 auto;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      font-size:28px;
      font-weight:600;
      color:#7d5968;
      letter-spacing:0.4px;
    }

    .menu-toggle{
      background:rgba(246,227,234,0.65);
      border:1px solid rgba(208,176,188,0.28);
      border-radius:16px;
      padding:12px 18px;
      font-size:18px;
      font-weight:600;
      color:#7d5968;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(171,135,149,0.06);
    }

    .menu-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.24);
      opacity:0;
      visibility:hidden;
      transition:0.28s ease;
      z-index:3998;
    }

    .menu-overlay.open{
      opacity:1;
      visibility:visible;
    }

    .side-menu{
      position:fixed;
      top:0;
      left:-340px;
      width:310px;
      max-width:86vw;
      height:100%;
      background:linear-gradient(180deg,#fffefe 0%,#fcf2f6 100%);
      box-shadow:12px 0 32px rgba(0,0,0,0.14);
      z-index:3999;
      transition:left 0.30s ease;
      overflow-y:auto;
    }

    .side-menu.open{
      left:0;
    }

    .side-menu-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:22px 18px 14px;
      border-bottom:1px solid #f0e4ea;
      margin-bottom:8px;
    }

    .side-menu-title{
      font-size:24px;
      font-weight:600;
      color:#7d5968;
    }

    .close-btn{
      background:transparent;
      border:0;
      font-size:32px;
      line-height:1;
      color:#7d5968;
      cursor:pointer;
    }

    .side-menu a{
      display:block;
      padding:17px 22px;
      font-size:19px;
      font-weight:600;
      color:#7d5968;
      border-bottom:1px solid #f4e9ee;
    }

    .facebook-side{
      position:fixed;
      right:0;
      top:50%;
      transform:translateY(-50%);
      z-index:5000;
      background:linear-gradient(180deg,#7c89ca,#536cbc);
      color:#fff;
      padding:16px 10px;
      border-radius:16px 0 0 16px;
      font-size:16px;
      font-weight:700;
      box-shadow:0 12px 24px rgba(0,0,0,0.18);
      writing-mode:vertical-rl;
      text-orientation:mixed;
      letter-spacing:1px;
      display:block;
    }

    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      text-align:center;
      padding:40px 20px 60px;
      overflow:hidden;
      background:linear-gradient(180deg,#fff8fb 0%,#f8eef3 100%);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(255,250,252,0.01), rgba(255,250,252,0.03)),
        url("file_000000007658720aa3e0e1312a65953c.png") center top / cover no-repeat;
      opacity:0.98;
      z-index:0;
      transform:scale(1.01);
    }

    /* PODMIENIONA CHMURA */

    .hero-box{
      position:relative;
      z-index:2;
      width:min(88%,760px);
      margin-top:380px;

      background:transparent;

      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.18);

      border-radius:40px;
      padding:34px 28px;

      box-shadow:0 10px 30px rgba(0,0,0,0.04);
    }

    .badge{
      display:inline-block;
      padding:10px 20px;
      border-radius:999px;
      background:rgba(248,232,239,0.10);
      color:#8c6673;
      letter-spacing:1.8px;
      text-transform:uppercase;
      font-size:12px;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,0.16);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    h1{
      margin:0;
      font-size:68px;
      line-height:1.02;
      color:#7a5665;
      letter-spacing:0.5px;
      font-weight:600;
      text-shadow:0 1px 0 rgba(255,255,255,0.10);
    }

    .hero-text{
      max-width:720px;
      margin:18px auto 0;
      font-size:22px;
      line-height:1.75;
      color:#6e5962;
    }

    .hero-buttons{
      margin-top:26px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      display:inline-block;
      padding:14px 24px;
      border-radius:999px;
      font-weight:600;
      font-size:16px;
    }

    .btn-primary{
      background:linear-gradient(90deg,#eac8d5,#f6e7ed);
      color:#6f4e5b;
      box-shadow:0 10px 22px rgba(183,142,157,0.14);
    }

    .btn-secondary{
      background:rgba(255,255,255,0.18);
      color:#765562;
      border:1px solid rgba(190,153,168,0.18);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .container{
      max-width:1240px;
      margin:0 auto;
      padding:36px 18px 70px;
    }

    .section{
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      border:1px solid rgba(224,195,206,0.38);
      border-radius:36px;
      padding:42px 30px;
      margin:28px 0;
      box-shadow:0 18px 40px rgba(173,139,152,0.08);
    }

    footer{
      text-align:center;
      padding:30px 20px 46px;
      color:#866873;
      font-size:15px;
    }

  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">Akwamaryn*PL</div>
      <button class="menu-toggle">☰ Menu</button>
    </div>
  </div>

  <a class="facebook-side" href="https://www.facebook.com/share/1NDiWJEyeZ/?mibextid=wwXIfr" target="_blank">Facebook</a>

  <section class="hero">
    <div class="hero-box">
      <div class="badge">AKWAMARYN*PL</div>
      <h1>Akwamaryn*PL</h1>
      <div class="hero-text">
        Luksusowa, domowa hodowla kotów rasowych stworzona z pasji do piękna,
        klasy, zdrowia i wyjątkowego charakteru. Każdy nasz kot jest otoczony
        troską, miłością i codzienną opieką.
      </div>
    </div>
  </section>

</body>
</html>
