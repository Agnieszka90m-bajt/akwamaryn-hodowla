<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje kotki | Akwamaryn*PL</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Georgia,"Times New Roman",serif;
background:linear-gradient(180deg,#fffafc 0%,#f8eef3 100%);
color:#654f58;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
z-index:5000;
background:rgba(255,248,251,0.95);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border-bottom:1px solid rgba(218,189,200,0.2);
}

.topbar-inner{
max-width:1280px;
margin:auto;
padding:16px 20px;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
gap:10px;
}

.brand{
font-size:26px;
font-weight:600;
color:#7a5665;
}

.nav-links{
display:flex;
flex-wrap:wrap;
gap:16px;
font-weight:600;
color:#7a5665;
}

.nav-links a{
text-decoration:none;
color:inherit;
font-size:16px;
transition:opacity 0.25s ease;
}

.nav-links a:hover{
opacity:0.72;
}

/* CONTAINER */

.container{
max-width:1240px;
margin:auto;
padding:38px 20px 70px;
}

.section{
background:rgba(255,255,255,0.84);
border:1px solid rgba(238,221,229,0.7);
border-radius:38px;
padding:40px 24px;
box-shadow:0 20px 40px rgba(173,139,152,0.08);
}

.section h1{
text-align:center;
font-size:54px;
margin-bottom:18px;
color:#7a5665;
line-height:1.05;
}

.section-intro{
max-width:930px;
margin:0 auto 34px;
text-align:center;
font-size:19px;
line-height:1.9;
color:#6e5a63;
}

/* KOTKI */

.cats-wrap{
display:grid;
gap:32px;
}

.cat-card{
display:grid;
grid-template-columns:380px 1fr;
gap:30px;
background:linear-gradient(180deg,#fffefe 0%,#fff7fb 100%);
border-radius:34px;
padding:24px;
box-shadow:0 16px 36px rgba(0,0,0,0.08);
border:1px solid rgba(240,223,230,0.95);
transition:transform 0.35s ease, box-shadow 0.35s ease, opacity 0.8s ease;
opacity:0;
transform:translateY(26px);
}

.cat-card.visible{
opacity:1;
transform:translateY(0);
}

.cat-card:hover{
transform:translateY(-6px);
box-shadow:0 22px 42px rgba(165,129,144,0.14);
}

/* RAMKA ZDJĘCIA */

.cat-photo-frame{
width:100%;
min-height:420px;
background:linear-gradient(180deg,#fffdfd 0%,#f8eef3 100%);
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
box-shadow:inset 0 0 0 1px rgba(244,226,234,0.65), 0 12px 28px rgba(0,0,0,0.08);
overflow:hidden;
}

/* ZAOKRĄGLONE ZDJĘCIE */

.cat-photo-frame img{
max-width:100%;
max-height:100%;
border-radius:24px;
cursor:pointer;
transition:transform 0.35s ease, filter 0.35s ease;
display:block;
}

.cat-photo-frame img:hover{
transform:scale(1.03);
filter:brightness(1.02);
}

.cat-info h2{
font-size:34px;
margin-bottom:16px;
color:#7a5665;
line-height:1.15;
}

display
